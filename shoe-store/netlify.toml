[build]
  command = "npm run build:client"
  publish = "dist/spa"

# API Proxy — redirect /api/* to the Render backend
[[redirects]]
  from = "/api/*"
  to = "https://stepup-backend.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html (React Router handles them)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
